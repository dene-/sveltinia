name: Publish package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org
      - run: yarn install --frozen-lockfile
      - if: github.event_name == 'release'
        run: node -e 'const pkg=require("./packages/sveltinia/package.json"); const tag=process.env.GITHUB_REF_NAME; if (tag !== `v${pkg.version}`) throw new Error(`Release tag ${tag} does not match package version v${pkg.version}`)'
      - run: yarn test
      - run: yarn build
      - run: npm publish ./packages/sveltinia --access public --registry https://registry.npmjs.org --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
